run_calibration:
  name: Run Calibration
  description: |
    Sweep the Shelly dimmer from 20% to 100% to build a per-boiler watt curve and store it for future calculations.
    The controller steps in 1% increments and waits 3 seconds between samples.
  fields:
    config_entry_id:
      name: Config Entry ID
      description: Optional config_entry_id when multiple Boiler Controller entries exist.
      example: "1234567890abcdef1234567890abcdef"
      selector:
        text: {}

cancel_calibration:
  name: Cancel Calibration
  description: Request the active calibration sweep to stop after the current measurement.
  fields:
    config_entry_id:
      name: Config Entry ID
      description: Optional config_entry_id when multiple Boiler Controller entries exist.
      example: "1234567890abcdef1234567890abcdef"
      selector:
        text: {}
